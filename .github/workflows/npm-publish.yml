name: npm OIDC provenance release (WIP — v0.1.0 BLOCKED)

# WIP: Pre-staged stub for trusted OIDC publishing (issues #5, #87).
# This workflow CANNOT fire an actual package publication today because:
#
#   1. It is manual-only (workflow_dispatch). No push/tag trigger is wired.
#   2. The release step is a hard NO-OP guard that exits non-zero while
#      package.json carries `private: true` or version `0.0.0-private`.
#      That guard must be removed in a deliberate, reviewed release PR.
#   3. scripts/verify.mjs forbids the literal release/publish commands and
#      the release-please action from landing in .github/ — both must be
#      whitelisted there before the live lane can be activated.
#
# FUTURE live configuration (tracked in issues #5 and #87):
#   trigger  : on release (published) where tag matches v[0-9]+.*
#   perms    : id-token: write (OIDC) + contents: read only
#   release  : `node setup` with registry-url set to the npmjs registry,
#              then `npm pack --dry-run` → `npm pack` → provenance-flagged
#              registry upload (command with --provenance --access public)
#              (the literal upload command is intentionally omitted until
#               scripts/verify.mjs whitelists it — see docs/release-security.md)
#   trusted publisher: configure on npmjs.com for this repo/workflow/env
#   environment protection: manual approval gate named "npm-release"
#
# Supply-chain posture (issue #87 — npm trusted publishing + OIDC provenance):
#   - Zero long-lived npm tokens: OIDC federation replaces NPM_TOKEN entirely.
#     id-token:write lets GitHub issue a short-lived OIDC JWT; npm exchanges
#     it for a scoped, run-scoped registry token via the trusted publishers API.
#   - Provenance attestation: the --provenance flag attaches a Sigstore build
#     attestation to every tarball, linking it to this exact workflow run,
#     repository, ref, and commit SHA. Consumers verify with `npm audit signatures`.
#   - Least privilege: only id-token:write + contents:read needed. No secrets,
#     no PATs, no stored NPM_TOKEN.
#
# See docs/release-security.md for the full decision record and five-step
# unblocking checklist.

on:
  workflow_dispatch:
    inputs:
      dry_run_reason:
        description: >
          Why this workflow is being inspected. The release step is a hard
          no-op guard while package.json is private / 0.0.0-private.
        required: true
        default: pre-0.1.0-oidc-readiness-check
      confirm:
        description: >
          Operator confirmation. Must be typed exactly as: inspect-only
        required: true
        default: inspect-only

concurrency:
  group: npm-oidc-release-${{ github.ref }}
  cancel-in-progress: false

# id-token:write: required for npm trusted publishing once the live release
# step is wired. Declared here so the permission scope is visible in review
# before the step is activated. No write to contents or packages.
permissions:
  id-token: write
  contents: read

jobs:
  release-guard:
    name: npm-oidc-release-noop-guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Assert inspect-only confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
          DRY_RUN_REASON: ${{ inputs.dry_run_reason }}
        run: |
          test "$CONFIRM" = "inspect-only"
          echo "npm OIDC release lane is intentionally inert."
          echo "Reason: $DRY_RUN_REASON"

      - name: Hard v0.1.0 release block
        # This guard keeps v0.1.0 from being released to the registry accidentally.
        # It must stay in place until a reviewed release PR completes all five
        # unblocking steps (see docs/release-security.md):
        #   (a) removes `private: true` from package.json,
        #   (b) sets a real semver version (not 0.0.0-private),
        #   (c) whitelists the registry-upload command in scripts/verify.mjs,
        #   (d) wires the tag/release trigger replacing workflow_dispatch above, and
        #   (e) configures the npm trusted publisher on npmjs.com.
        # DO NOT remove this guard without all five steps reviewed and merged.
        run: |
          IS_PRIVATE="$(node -p "require('./package.json').private === true")"
          VERSION="$(node -p "require('./package.json').version")"
          echo "package.json private=$IS_PRIVATE  version=$VERSION"
          if [ "$IS_PRIVATE" = "true" ] || [ "$VERSION" = "0.0.0-private" ]; then
            echo "BLOCKED: package is a private pre-0.1.0 scaffold."
            echo "No registry upload can run until private:true is removed and"
            echo "a real semver version is set. See docs/release-security.md."
            exit 1
          fi
          echo "Version guard would pass — but the live release step is not yet"
          echo "wired (see docs/release-security.md and issues #5, #87)."
          echo "This workflow remains a no-op until the full release checklist"
          echo "is completed and reviewed."

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: npm
          # registry-url: set to the npmjs registry once the live release step
          # is activated. Required for OIDC token exchange via NODE_AUTH_TOKEN.
          # Omitted here while the step is stubbed so no token request is made
          # during the no-op guard run.

      - name: Build
        # Active now so reviewers can verify the artifact shape without
        # triggering a registry upload.
        run: npm ci && npm run build

      - name: Registry-upload stub (no-op — v0.1.0 BLOCKED)
        # FUTURE: once all five unblocking steps are reviewed and merged,
        # replace this step with the live provenance-flagged registry upload.
        # The exact command (with --provenance --access public) and the
        # NODE_AUTH_TOKEN wiring are documented in docs/release-security.md.
        # The OIDC JWT vended by id-token:write above will authenticate
        # without any stored secret.
        run: |
          echo "Registry-upload step is intentionally stubbed."
          echo "Live release flow and OIDC wiring: see docs/release-security.md."
          echo "Trusted publisher configuration: npmjs.com -> this repo/workflow."
          echo "v0.1.0 stays blocked. See issues #5 and #87."
