name: MVP feature proposal
description: Propose a narrowly scoped oh-my-antigrav MVP feature
labels:
  - enhancement
body:
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Why this stays in MVP scope
      description: How it maps to the deep-interview -> ralplan -> team -> ultragoal loop.
    validations:
      required: true
  - type: checkboxes
    id: guardrails
    attributes:
      label: Guardrails
      options:
        - label: This does not add telemetry.
          required: true
        - label: This does not publish packages or releases.
          required: true
        - label: This keeps the default surface small.
          required: true
