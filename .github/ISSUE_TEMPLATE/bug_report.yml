name: Bug report
description: Report a local Antigravity scaffold bug
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification evidence
      description: Include npm run verify output when possible.
