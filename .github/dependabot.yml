version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automation
      - pre-0.1.0
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - PeterPonyu

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automation
      - security
      - pre-0.1.0
    commit-message:
      prefix: chore(ci)
      include: scope
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - PeterPonyu
